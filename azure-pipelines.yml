trigger:
- Calculator

pool:
  vmImage: ubuntu-latest

variables:
  terraformVersion: '1.5.7'

stages:

# =========================================================
# STAGE 1 - CREATE AZURE RESOURCES
# =========================================================

- stage: CreateResources

  displayName: Create Azure Resources

  jobs:

  - job: TerraformDeployment

    displayName: Terraform_Deployment

    pool:
      vmImage: ubuntu-latest

    steps:

    # =====================================================
    # CHECKOUT CODE
    # =====================================================

    - checkout: self

    # =====================================================
    # INSTALL TERRAFORM
    # =====================================================

    - task: TerraformInstaller@1

      displayName: Install Terraform

      inputs:
        terraformVersion: '1.5.7'

    # =====================================================
    # TERRAFORM INIT
    # =====================================================

    - task: AzureCLI@2

      displayName: Terraform Init

      inputs:
        azureSubscription: 'AzureSPN'
        scriptType: bash
        scriptLocation: inlineScript

        inlineScript: |

          cd terraform

          terraform init

    # =====================================================
    # TERRAFORM VALIDATE
    # =====================================================

    - task: AzureCLI@2

      displayName: Terraform Validate

      inputs:
        azureSubscription: 'AzureSPN'
        scriptType: bash
        scriptLocation: inlineScript

        inlineScript: |

          cd terraform

          terraform validate

    # =====================================================
    # CHECK & IMPORT EXISTING RESOURCES
    # =====================================================

    - task: AzureCLI@2

      displayName: Check And Import Existing Resources

      inputs:
        azureSubscription: 'AzureSPN'
        scriptType: bash
        scriptLocation: inlineScript

        inlineScript: |

          cd terraform

          echo "Initializing Terraform..."

          terraform init

          # ===============================================
          # RESOURCE GROUP
          # ===============================================

          echo "Checking Resource Group..."

          if az group exists --name RG_cal_ind_dev_01; then

            echo "Resource Group exists. Importing..."

            terraform import azurerm_resource_group.rg \
            /subscriptions/47e11824-86bc-41f8-9dbd-2816b994a6a2/resourceGroups/RG_cal_ind_dev_01 || true

          else

            echo "Resource Group does not exist."

          fi

          # ===============================================
          # APP SERVICE PLAN
          # ===============================================

          echo "Checking App Service Plan..."

          ASP_EXISTS=$(az appservice plan show \
          --name ASP_cal_ind_dev_01 \
          --resource-group RG_cal_ind_dev_01 \
          --query "name" \
          -o tsv 2>/dev/null || echo "")

          if [ ! -z "$ASP_EXISTS" ]; then

            echo "App Service Plan exists. Importing..."

            terraform import azurerm_service_plan.asp \
            /subscriptions/47e11824-86bc-41f8-9dbd-2816b994a6a2/resourceGroups/RG_cal_ind_dev_01/providers/Microsoft.Web/serverFarms/ASP_cal_ind_dev_01 || true

          else

            echo "App Service Plan does not exist."

          fi

          # ===============================================
          # WEB APP
          # ===============================================

          echo "Checking Web App..."

          WEBAPP_EXISTS=$(az webapp show \
          --name webcalinddev01 \
          --resource-group RG_cal_ind_dev_01 \
          --query "name" \
          -o tsv 2>/dev/null || echo "")

          if [ ! -z "$WEBAPP_EXISTS" ]; then

            echo "Web App exists. Importing..."

            terraform import azurerm_linux_web_app.webapp \
            /subscriptions/47e11824-86bc-41f8-9dbd-2816b994a6a2/resourceGroups/RG_cal_ind_dev_01/providers/Microsoft.Web/sites/webcalinddev01 || true

          else

            echo "Web App does not exist."

          fi

          echo "Import process completed."

    # =====================================================
    # TERRAFORM PLAN
    # =====================================================

    - task: AzureCLI@2

      displayName: Terraform Plan

      inputs:
        azureSubscription: 'AzureSPN'
        scriptType: bash
        scriptLocation: inlineScript

        inlineScript: |

          cd terraform

          terraform plan

    # =====================================================
    # TERRAFORM APPLY
    # =====================================================

    - task: AzureCLI@2

      displayName: Terraform Apply

      inputs:
        azureSubscription: 'AzureSPN'
        scriptType: bash
        scriptLocation: inlineScript

        inlineScript: |

          cd terraform

          terraform apply -auto-approve

# =========================================================
# STAGE 2 - ARCHIVE & PUBLISH ARTIFACT
# =========================================================

- stage: BuildArtifact

  displayName: Archive and Publish Artifact

  dependsOn: CreateResources

  condition: succeeded()

  jobs:

  - job: BuildAndPublish

    displayName: Build_And_Publish

    pool:
      vmImage: ubuntu-latest

    steps:

    # =====================================================
    # CHECKOUT CODE
    # =====================================================

    - checkout: self

    # =====================================================
    # ARCHIVE APPLICATION FILES
    # =====================================================

    - task: ArchiveFiles@2

      displayName: Archive Application Files

      inputs:
        rootFolderOrFile: '$(Build.SourcesDirectory)'
        includeRootFolder: false
        archiveType: zip
        archiveFile: '$(Build.ArtifactStagingDirectory)/app.zip'
        replaceExistingArchive: true

    # =====================================================
    # PUBLISH BUILD ARTIFACT
    # =====================================================

    - task: PublishBuildArtifacts@1

      displayName: Publish Application Artifact

      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/app.zip'
        ArtifactName: 'drop'
        publishLocation: 'Container'

# =========================================================
# STAGE 3 - DEPLOY WEB APPLICATION
# =========================================================

- stage: DeployWebApp

  displayName: Deploy Web Application

  dependsOn: BuildArtifact

  condition: succeeded()

  jobs:

  - job: DeployApplication

    displayName: Deploy_Application

    pool:
      vmImage: ubuntu-latest

    steps:

    # =====================================================
    # DOWNLOAD BUILD ARTIFACT
    # =====================================================

    - task: DownloadBuildArtifacts@0

      displayName: Download Application Artifact

      inputs:
        buildType: 'current'
        downloadType: 'single'
        artifactName: 'drop'
        downloadPath: '$(Pipeline.Workspace)'

    # =====================================================
    # DEPLOY TO AZURE WEB APP
    # =====================================================

    - task: AzureWebApp@1

      displayName: Deploy To Azure Web App

      inputs:
        azureSubscription: 'AzureSPN'
        appType: 'webAppLinux'
        appName: 'webcalinddev01'
        package: '$(Pipeline.Workspace)/drop/app.zip'
