# Task-1 
# Pipeline to Run the Sample Python Application in GitHub Account
# Before running the pipeline make sure that the App file is present in the GitHub Account
# GitHub Repository Link: https://github.com/Kureti-Venkat-Nishit-Pvt/DevOps_Assignment/blob/main/Hello_Hexaware.py 

trigger:
  branches:
    include:
      - main
stages:
  - stage: __default
    jobs:
      - job: Print_Hello_Hexaware
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: UsePythonVersion@0
            displayName: 'Install Latest Python Version in Linux'
            inputs:
              versionSpec: '3.x'
          - task: CmdLine@2
            displayName: 'Run the Sample Application in GitHub using Azure DevOps'
            inputs:
              script: |
                python -m pip install --upgrade pip
                python Hello_Hexaware.py
          - task: PublishBuildArtifacts@1
            inputs: 
              PathtoPublish: '$(Build.ArtifactStagingDirectory)'
              ArtifactName: 'HelloApp_Drop_$(Build.BuildNumber)'