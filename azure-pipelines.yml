trigger:
- Calculator

pool:
  vmImage: ubuntu-latest

variables:
  terraformVersion: '1.5.7'

stages:

# =========================================================
# TERRAFORM + APPLICATION DEPLOYMENT STAGE
# =========================================================

- stage: CreateResources

  displayName: TF Resource Creation

  jobs:

  - job: TFResourceCreation

    displayName: TF_Resource_Creation

    pool:
      vmImage: ubuntu-latest

    steps:

    # =====================================================
    # CHECKOUT CODE
    # =====================================================

    - checkout: self

    # =====================================================
    # INSTALL TERRAFORM
    # =====================================================

    - task: TerraformInstaller@1

      displayName: Install Terraform

      inputs:
        terraformVersion: '1.5.7'

    # =====================================================
    # TERRAFORM INIT
    # =====================================================

    - task: AzureCLI@2

      displayName: Terraform Init

      inputs:
        azureSubscription: 'AzureSPN'
        scriptType: bash
        scriptLocation: inlineScript

        inlineScript: |

          cd terraform

          terraform init

    # =====================================================
    # TERRAFORM VALIDATE
    # =====================================================

    - task: AzureCLI@2

      displayName: Terraform Validate

      inputs:
        azureSubscription: 'AzureSPN'
        scriptType: bash
        scriptLocation: inlineScript

        inlineScript: |

          cd terraform

          terraform validate

    # =====================================================
    # CHECK AND IMPORT EXISTING RESOURCE GROUP
    # =====================================================

    - task: AzureCLI@2

      displayName: Check Existing Resource Group

      inputs:
        azureSubscription: 'AzureSPN'
        scriptType: bash
        scriptLocation: inlineScript

        inlineScript: |

          cd terraform

          echo "Checking if Resource Group exists..."

          if az group exists --name RG_cal_ind_dev_01; then

            echo "Resource Group exists. Importing into Terraform state..."

            terraform init

            terraform import azurerm_resource_group.rg /subscriptions/47e11824-86bc-41f8-9dbd-2816b994a6a2/resourceGroups/RG_cal_ind_dev_01 || true

          else

            echo "Resource Group does not exist. Terraform will create it."

          fi

    # =====================================================
    # TERRAFORM PLAN
    # =====================================================

    - task: AzureCLI@2

      displayName: Terraform Plan

      inputs:
        azureSubscription: 'AzureSPN'
        scriptType: bash
        scriptLocation: inlineScript

        inlineScript: |

          cd terraform

          terraform plan

    # =====================================================
    # TERRAFORM APPLY
    # =====================================================

    - task: AzureCLI@2

      displayName: Terraform Apply

      inputs:
        azureSubscription: 'AzureSPN'
        scriptType: bash
        scriptLocation: inlineScript

        inlineScript: |

          cd terraform

          terraform apply -auto-approve

    # =====================================================
    # ARCHIVE APPLICATION FILES
    # =====================================================

    - task: ArchiveFiles@2

      displayName: Archive Application Files

      inputs:
        rootFolderOrFile: '$(Build.SourcesDirectory)'
        includeRootFolder: false
        archiveType: zip
        archiveFile: '$(Build.ArtifactStagingDirectory)/app.zip'
        replaceExistingArchive: true

    # =====================================================
    # DEPLOY APPLICATION TO AZURE WEB APP
    # =====================================================

    - task: AzureWebApp@1

      displayName: Deploy To Azure Web App

      inputs:
        azureSubscription: 'AzureSPN'
        appType: 'webAppLinux'
        appName: 'webcalinddev01'
        package: '$(Build.ArtifactStagingDirectory)/app.zip'
