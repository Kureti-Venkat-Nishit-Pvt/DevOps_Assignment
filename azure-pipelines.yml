# =========================================================
# Azure Pipelines YAML for DRAGOT Calculator Application  |
# =========================================================

# This pipeline automates the deployment of the DRAGOT Calculator application
trigger:
- Mark_6

parameters:
- name: environment
  displayName: Environment
  type: string
  default: dev
  values:
  - dev
  - prod

pool:
  vmImage: ubuntu-latest

variables:
  terraformVersion: '1.5.7'
  azureServiceConnection: 'AzureSPN'

  # Controls whether AKS deployment stage executes.
  deployToAks: 'true'

  # Dynamically selects:
  # dev.tfvars OR prod.tfvars
  tfvarsFile: '${{ parameters.environment }}.tfvars'

  # Docker image repository name used for:
  # - ACR image builds
  # - WebApp deployments
  # - AKS Helm deployments
  imageRepository: 'dragot-calculator'

  # Pipeline metadata variables
  envTag: ${{ parameters.environment }}
  buildId: $(Build.BuildId)

stages:

# =========================================================
# CREATE AZURE RESOURCES
# =========================================================
- stage: CreateResources
  displayName: Create Azure Resources

  jobs:
  - job: TerraformDeployment
    displayName: Terraform Resource Creation

    steps:

    - checkout: self

    # -----------------------------------------------------
    # Install Terraform
    # -----------------------------------------------------
    - task: TerraformInstaller@1
      displayName: Install Terraform
      inputs:
        terraformVersion: '$(terraformVersion)'

    # -----------------------------------------------------
    # Terraform Init + Validate
    # -----------------------------------------------------
    - task: AzureCLI@2
      displayName: Terraform Init and Validate
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -eo pipefail

          cd terraform

          terraform init

          terraform validate

    # -----------------------------------------------------
    # Terraform Apply
    #
    # NEWLY UPDATED:
    # Added dynamic Azure DevOps Build ID
    #
    # This Build ID is passed into Terraform
    # and stored as Azure Resource Tags.
    #
    # Used later by:
    # - Resource inventory report
    # - Excel report generation
    # - New vs Existing resource tracking
    # -----------------------------------------------------
    - task: AzureCLI@2
      displayName: Terraform Apply
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -eo pipefail

          cd terraform

          terraform apply -auto-approve \
            -var-file="$(tfvarsFile)" \
            -var="build_id=$(Build.BuildId)"

    # -----------------------------------------------------
    # Export Terraform Outputs
    # -----------------------------------------------------
    - task: AzureCLI@2
      name: terraformOutputs
      displayName: Export Terraform Outputs
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -eo pipefail

          cd terraform

          RESOURCE_GROUP_NAME=$(terraform output -raw resource_group_name)
          ACR_NAME=$(terraform output -raw acr_name)
          AKS_CLUSTER_NAME=$(terraform output -raw aks_cluster_name)
          WEBAPP_NAME=$(terraform output -raw webapp_name)

          echo "Resource Group: $RESOURCE_GROUP_NAME"
          echo "ACR Name: $ACR_NAME"
          echo "AKS Cluster: $AKS_CLUSTER_NAME"
          echo "Web App: $WEBAPP_NAME"

          echo "##vso[task.setvariable variable=resourceGroupName;isOutput=true]$RESOURCE_GROUP_NAME"
          echo "##vso[task.setvariable variable=acrName;isOutput=true]$ACR_NAME"
          echo "##vso[task.setvariable variable=aksClusterName;isOutput=true]$AKS_CLUSTER_NAME"
          echo "##vso[task.setvariable variable=webAppName;isOutput=true]$WEBAPP_NAME"

          echo "Terraform outputs exported successfully."

    # -----------------------------------------------------
    # Final Verification
    # -----------------------------------------------------
    - task: AzureCLI@2
      displayName: Final Terraform Plan Verification
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -eo pipefail

          cd terraform

          terraform plan -var-file="$(tfvarsFile)"


# =========================================================
# BUILD ARTIFACT
# =========================================================
- stage: BuildArtifact
  displayName: Archive and Publish Artifact

  dependsOn: CreateResources

  condition: succeeded()

  jobs:
  - job: BuildAndPublish

    steps:

    - checkout: self

    - task: ArchiveFiles@2
      displayName: Archive Application Files
      inputs:
        rootFolderOrFile: '$(Build.SourcesDirectory)'
        includeRootFolder: false
        archiveType: zip
        archiveFile: '$(Build.ArtifactStagingDirectory)/app.zip'
        replaceExistingArchive: true

    - task: PublishBuildArtifacts@1
      displayName: Publish Application Artifact
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/app.zip'
        ArtifactName: 'drop'
        publishLocation: 'Container'


# =========================================================
# DOCKER BUILD & PUSH
# =========================================================
- stage: BuildAndPushImage
  displayName: Build and Push Docker Image

  dependsOn:
  - CreateResources
  - BuildArtifact

  condition: succeeded()

  variables:
    acrName: $[ stageDependencies.CreateResources.TerraformDeployment.outputs['terraformOutputs.acrName'] ]
    resourceGroupName: $[ stageDependencies.CreateResources.TerraformDeployment.outputs['terraformOutputs.resourceGroupName'] ]

  jobs:
  - job: BuildAndPush

    steps:

    - checkout: self

    - task: AzureCLI@2
      displayName: Build and Push Image
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -euo pipefail

          echo "acrName=$(acrName)"
          echo "resourceGroupName=$(resourceGroupName)"

          az acr show \
            -n "$(acrName)" \
            -g "$(resourceGroupName)" 1>/dev/null

          az acr build \
            -r "$(acrName)" \
            -t "$(imageRepository):$(Build.BuildId)" \
            .


# =========================================================
# MANUAL APPROVAL
# =========================================================
- stage: ManualApproval
  displayName: Manual Approval

  dependsOn: BuildAndPushImage

  condition: succeeded()

  jobs:
  - job: WaitForApproval

    pool: server

    steps:

    - task: ManualValidation@0
      timeoutInMinutes: 1440
      inputs:
        instructions: 'Approve to continue deployment.'
        onTimeout: reject


# =========================================================
# DEPLOY WEB APP
# =========================================================
- stage: DeployWebAppContainer
  displayName: Deploy WebApp Container

  dependsOn:
  - CreateResources
  - ManualApproval

  condition: succeeded()

  variables:
    acrName: $[ stageDependencies.CreateResources.TerraformDeployment.outputs['terraformOutputs.acrName'] ]
    resourceGroupName: $[ stageDependencies.CreateResources.TerraformDeployment.outputs['terraformOutputs.resourceGroupName'] ]
    webAppName: $[ stageDependencies.CreateResources.TerraformDeployment.outputs['terraformOutputs.webAppName'] ]

  jobs:
  - deployment: DeployApplication

    environment: '${{ parameters.environment }}'

    strategy:
      runOnce:
        deploy:
          steps:

          - task: AzureCLI@2
            displayName: Deploy WebApp Image
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail

                LOGIN_SERVER=$(az acr show \
                  -n "$(acrName)" \
                  -g "$(resourceGroupName)" \
                  --query loginServer -o tsv)

                IMAGE="${LOGIN_SERVER}/$(imageRepository):$(Build.BuildId)"

                echo "Deploying Image: $IMAGE"

                az webapp config container set \
                  --resource-group "$(resourceGroupName)" \
                  --name "$(webAppName)" \
                  --docker-custom-image-name "$IMAGE"


# =========================================================
# OPTIONAL AKS DEPLOYMENT
# =========================================================
- stage: DeployAKSOptional
  displayName: Deploy to AKS

  dependsOn:
  - CreateResources
  - ManualApproval

  condition: and(succeeded(), eq(variables['deployToAks'], 'true'))

  variables:
    acrName: $[ stageDependencies.CreateResources.TerraformDeployment.outputs['terraformOutputs.acrName'] ]
    resourceGroupName: $[ stageDependencies.CreateResources.TerraformDeployment.outputs['terraformOutputs.resourceGroupName'] ]
    aksClusterName: $[ stageDependencies.CreateResources.TerraformDeployment.outputs['terraformOutputs.aksClusterName'] ]

  jobs:
  - deployment: DeployToAKS

    environment: '${{ parameters.environment }}'

    strategy:
      runOnce:
        deploy:
          steps:

          - checkout: self

          - task: HelmInstaller@1
            displayName: Install Helm
            inputs:
              helmVersionToInstall: '3.14.4'

          - task: AzureCLI@2
            displayName: Deploy to AKS
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail

                LOGIN_SERVER=$(az acr show \
                  -n "$(acrName)" \
                  -g "$(resourceGroupName)" \
                  --query loginServer -o tsv)

                az aks get-credentials \
                  --resource-group "$(resourceGroupName)" \
                  --name "$(aksClusterName)" \
                  --overwrite-existing

                helm upgrade --install dragot-calculator \
                  "$(Build.SourcesDirectory)/helm/dragot-calculator" \
                  --namespace calculator \
                  --create-namespace \
                  --set image.repository="${LOGIN_SERVER}/$(imageRepository)" \
                  --set image.tag="$(Build.BuildId)" \
                  --wait


# =========================================================
# RESOURCE REPORT GENERATION
# =========================================================
- stage: GenerateResourceReport
  displayName: Generate Resource Inventory Report

  dependsOn:
  - CreateResources
  - DeployWebAppContainer
  - DeployAKSOptional

  condition: always()

  jobs:
  - job: Report

    steps:

    - checkout: self

    # -----------------------------------------------------
    # FETCH ALL AZURE RESOURCES
    # -----------------------------------------------------
    - task: AzureCLI@2
      displayName: Fetch All Azure Resources
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -euo pipefail

          mkdir -p output

          echo "Fetching ALL Azure resources from subscription..."

          az resource list \
            --query "[].{
              resourceGroup:resourceGroup,
              name:name,
              type:type,
              env:tags.ENV,
              buildId:tags.buildId
            }" \
            -o json > output/resources.json

          echo "Azure resource inventory generated."

          cat output/resources.json

    # -----------------------------------------------------
    # INSTALL PYTHON
    # -----------------------------------------------------
    - task: UsePythonVersion@0
      displayName: Install Python
      inputs:
        versionSpec: '3.x'

    # -----------------------------------------------------
    # GENERATE EXCEL REPORT
    # -----------------------------------------------------
    - script: |
        set -euo pipefail

        export BUILD_BUILDID=$(Build.BuildId)

        pip install openpyxl

        python scripts/generate_resource_report.py
      displayName: Generate Excel Report

    # -----------------------------------------------------
    # PUBLISH REPORT
    # -----------------------------------------------------
    - task: PublishBuildArtifacts@1
      displayName: Publish Resource Report
      inputs:
        PathtoPublish: 'output'
        ArtifactName: 'resource-report'
        publishLocation: 'Container'
        