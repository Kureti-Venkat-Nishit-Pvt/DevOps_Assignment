trigger:
- Calculator

pool:
  vmImage: ubuntu-latest

variables:
  terraformVersion: '1.5.7'

stages:

# =========================================================
# STAGE 1 - CREATE AZURE RESOURCES
# =========================================================

- stage: CreateResources

  displayName: Create Azure Resources

  jobs:

  - job: TerraformDeployment

    displayName: Terraform Deployment

    pool:
      vmImage: ubuntu-latest

    steps:

    # =====================================================
    # CHECKOUT CODE
    # =====================================================

    - checkout: self

    # =====================================================
    # INSTALL TERRAFORM
    # =====================================================

    - task: TerraformInstaller@1

      displayName: Install Terraform

      inputs:
        terraformVersion: '1.5.7'

    # =====================================================
    # TERRAFORM INIT
    # =====================================================

    - task: AzureCLI@2

      displayName: Terraform Init

      inputs:
        azureSubscription: 'AzureSPN'
        scriptType: bash
        scriptLocation: inlineScript

        inlineScript: |

          cd terraform

          terraform init

    # =====================================================
    # TERRAFORM VALIDATE
    # =====================================================

    - task: AzureCLI@2

      displayName: Terraform Validate

      inputs:
        azureSubscription: 'AzureSPN'
        scriptType: bash
        scriptLocation: inlineScript

        inlineScript: |

          cd terraform

          terraform validate

    # =====================================================
    # TERRAFORM PLAN
    # =====================================================

    - task: AzureCLI@2

      displayName: Terraform Plan

      inputs:
        azureSubscription: 'AzureSPN'
        scriptType: bash
        scriptLocation: inlineScript

        inlineScript: |

          cd terraform

          terraform plan -var-file="terraform.tfvars"

    # =====================================================
    # TERRAFORM APPLY
    # =====================================================

    - task: AzureCLI@2

      displayName: Terraform Apply

      inputs:
        azureSubscription: 'AzureSPN'
        scriptType: bash
        scriptLocation: inlineScript

        inlineScript: |

          cd terraform

          terraform apply -auto-approve -var-file="terraform.tfvars"

          echo "Getting Terraform Outputs..."

          WEBAPP_NAME=$(terraform output -raw web_app_name)

          echo "##vso[task.setvariable variable=WEBAPP_NAME;isOutput=true]$WEBAPP_NAME"

      name: terraformApplyStep

# =========================================================
# STAGE 2 - BUILD APPLICATION
# =========================================================

- stage: BuildArtifact

  displayName: Build Application Artifact

  dependsOn: CreateResources

  jobs:

  - job: BuildAndPublish

    displayName: Archive And Publish Artifact

    pool:
      vmImage: ubuntu-latest

    steps:

    - checkout: self

    # =====================================================
    # ARCHIVE FILES
    # =====================================================

    - task: ArchiveFiles@2

      displayName: Archive Application Files

      inputs:
        rootFolderOrFile: '$(Build.SourcesDirectory)'
        includeRootFolder: false
        archiveType: zip
        archiveFile: '$(Build.ArtifactStagingDirectory)/app.zip'
        replaceExistingArchive: true

    # =====================================================
    # PUBLISH ARTIFACT
    # =====================================================

    - task: PublishBuildArtifacts@1

      displayName: Publish Build Artifact

      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/app.zip'
        ArtifactName: 'drop'
        publishLocation: 'Container'

# =========================================================
# STAGE 3 - DEPLOY WEB APPLICATION
# =========================================================

- stage: DeployWebApp

  displayName: Deploy Web Application

  dependsOn: BuildArtifact

  jobs:

  - job: DeployApplication

    displayName: Deploy To Azure Web App

    pool:
      vmImage: ubuntu-latest

    variables:
      WEBAPP_NAME: $[ stageDependencies.CreateResources.TerraformDeployment.outputs['terraformApplyStep.WEBAPP_NAME'] ]

    steps:

    # =====================================================
    # DOWNLOAD ARTIFACT
    # =====================================================

    - task: DownloadBuildArtifacts@0

      displayName: Download Application Artifact

      inputs:
        buildType: 'current'
        downloadType: 'single'
        artifactName: 'drop'
        downloadPath: '$(Pipeline.Workspace)'

    # =====================================================
    # DEPLOY WEB APPLICATION
    # =====================================================

    - task: AzureWebApp@1

      displayName: Deploy To Azure Web App

      inputs:
        azureSubscription: 'AzureSPN'
        appType: 'webAppLinux'
        appName: '$(WEBAPP_NAME)'
        package: '$(Pipeline.Workspace)/drop/app.zip'
