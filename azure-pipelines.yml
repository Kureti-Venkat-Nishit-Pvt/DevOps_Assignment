trigger:
- Mark_6

parameters:
- name: environment
  displayName: Environment
  type: string
  default: dev
  values:
  - dev
  - prod

pool:
  vmImage: ubuntu-latest

variables:
  terraformVersion: '1.5.7'
  azureServiceConnection: 'AzureSPN'
  deployToAks: 'true'
  tfvarsFile: '${{ parameters.environment }}.tfvars'
  imageRepository: 'dragot-calculator'

  # Only pipeline-controlled metadata.
  # Infrastructure names are dynamically obtained from Terraform outputs.
  envTag: ${{ parameters.environment }}
  buildId: $(Build.BuildId)

stages:

# =========================================================
# CREATE AZURE RESOURCES
# =========================================================
- stage: CreateResources
  displayName: Create Azure Resources

  jobs:
  - job: TerraformDeployment
    displayName: Terraform Resource Creation

    steps:
    - checkout: self

    # Install Terraform version required for the deployment.
    - task: TerraformInstaller@1
      displayName: Install Terraform
      inputs:
        terraformVersion: '$(terraformVersion)'

    # Initialize Terraform providers/modules and validate configuration syntax.
    - task: AzureCLI@2
      displayName: Terraform Init and Validate
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -eo pipefail

          cd terraform

          terraform init

          terraform validate

    # Apply complete Terraform configuration.
    # Terraform automatically resolves dependencies between resources.
    - task: AzureCLI@2
      displayName: Terraform Apply
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -eo pipefail

          cd terraform

          terraform apply -auto-approve \
            -var-file="$(tfvarsFile)"

    # Export Terraform outputs as Azure DevOps pipeline variables.
    # These variables are later used in Docker build, Web App deployment,
    # and AKS deployment stages.
    - task: AzureCLI@2
      displayName: Export Terraform Outputs
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -eo pipefail

          cd terraform

          RESOURCE_GROUP_NAME=$(terraform output -raw resource_group_name)
          ACR_NAME=$(terraform output -raw acr_name)
          AKS_CLUSTER_NAME=$(terraform output -raw aks_cluster_name)
          WEBAPP_NAME=$(terraform output -raw webapp_name)

          echo "##vso[task.setvariable variable=resourceGroupName]$RESOURCE_GROUP_NAME"
          echo "##vso[task.setvariable variable=acrName]$ACR_NAME"
          echo "##vso[task.setvariable variable=aksClusterName]$AKS_CLUSTER_NAME"
          echo "##vso[task.setvariable variable=webAppName]$WEBAPP_NAME"

          echo "Terraform outputs exported successfully."

    # Final verification stage.
    # Ensures Terraform state is fully synchronized.
    - task: AzureCLI@2
      displayName: Final Terraform Plan Verification
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -eo pipefail

          cd terraform

          terraform plan -var-file="$(tfvarsFile)"


# =========================================================
# BUILD ARTIFACT
# =========================================================
- stage: BuildArtifact
  displayName: Archive and Publish Artifact
  dependsOn: CreateResources
  condition: succeeded()

  jobs:
  - job: BuildAndPublish

    steps:
    - checkout: self

    # Creates deployable ZIP artifact for the application source code.
    - task: ArchiveFiles@2
      displayName: Archive Application Files
      inputs:
        rootFolderOrFile: '$(Build.SourcesDirectory)'
        includeRootFolder: false
        archiveType: zip
        archiveFile: '$(Build.ArtifactStagingDirectory)/app.zip'
        replaceExistingArchive: true

    # Publishes build artifact to Azure DevOps pipeline artifacts.
    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/app.zip'
        ArtifactName: 'drop'
        publishLocation: 'Container'


# =========================================================
# DOCKER BUILD & PUSH
# =========================================================
- stage: BuildAndPushImage
  displayName: Build and Push Docker Image
  dependsOn: BuildArtifact
  condition: succeeded()

  jobs:
  - job: BuildAndPush

    steps:
    - checkout: self

    # Builds Docker image using Azure Container Registry build service
    # and pushes image directly into ACR.
    - task: AzureCLI@2
      displayName: Build and Push Image
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -euo pipefail

          az acr show \
            -n "$(acrName)" \
            -g "$(resourceGroupName)" 1>/dev/null

          az acr build \
            -r "$(acrName)" \
            -t "$(imageRepository):$(Build.BuildId)" \
            .


# =========================================================
# MANUAL APPROVAL
# =========================================================
- stage: ManualApproval
  displayName: Manual Approval
  dependsOn: BuildAndPushImage
  condition: succeeded()

  jobs:
  - job: WaitForApproval

    pool: server

    steps:
    - task: ManualValidation@0
      timeoutInMinutes: 1440
      inputs:
        instructions: 'Approve to continue deployment.'
        onTimeout: 'reject'


# =========================================================
# DEPLOY WEB APP
# =========================================================
- stage: DeployWebAppContainer
  displayName: Deploy WebApp Container
  dependsOn: ManualApproval
  condition: succeeded()

  jobs:
  - deployment: DeployApplication
    environment: '${{ parameters.environment }}'

    strategy:
      runOnce:
        deploy:
          steps:

          # Deploy latest Docker image to Azure Linux Web App.
          - task: AzureCLI@2
            displayName: Deploy WebApp Image
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail

                LOGIN_SERVER=$(az acr show \
                  -n "$(acrName)" \
                  -g "$(resourceGroupName)" \
                  --query loginServer -o tsv)

                IMAGE="${LOGIN_SERVER}/$(imageRepository):$(Build.BuildId)"

                az webapp config container set \
                  --resource-group "$(resourceGroupName)" \
                  --name "$(webAppName)" \
                  --docker-custom-image-name "$IMAGE"


# =========================================================
# OPTIONAL AKS DEPLOYMENT
# =========================================================
- stage: DeployAKSOptional
  displayName: Deploy to AKS
  dependsOn: ManualApproval
  condition: and(succeeded(), eq(variables['deployToAks'], 'true'))

  jobs:
  - deployment: DeployToAKS
    environment: '${{ parameters.environment }}'

    strategy:
      runOnce:
        deploy:
          steps:

          - checkout: self

          # Installs Helm required for AKS deployments.
          - task: HelmInstaller@1
            inputs:
              helmVersionToInstall: '3.14.4'

          # Deploy application into AKS cluster using Helm chart.
          - task: AzureCLI@2
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail

                LOGIN_SERVER=$(az acr show \
                  -n "$(acrName)" \
                  -g "$(resourceGroupName)" \
                  --query loginServer -o tsv)

                az aks get-credentials \
                  --resource-group "$(resourceGroupName)" \
                  --name "$(aksClusterName)" \
                  --overwrite-existing

                helm upgrade --install dragot-calculator \
                  "$(Build.SourcesDirectory)/helm/dragot-calculator" \
                  --namespace calculator \
                  --create-namespace \
                  --set image.repository="${LOGIN_SERVER}/$(imageRepository)" \
                  --set image.tag="$(Build.BuildId)" \
                  --wait


# =========================================================
# 📊 RESOURCE REPORT GENERATION
# =========================================================
- stage: GenerateResourceReport
  displayName: Generate Resource Inventory Report

  dependsOn:
  - DeployWebAppContainer
  - DeployAKSOptional

  condition: always()

  jobs:
  - job: Report

    steps:

    - checkout: self

    # Fetch all Azure resources from subscription.
    # ENV tag is extracted from Terraform-applied resource tags.
    - task: AzureCLI@2
      displayName: Fetch Azure Resources
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          mkdir -p output

          az resource list \
            --query "[].{
              resourceGroup:resourceGroup,
              name:name,
              type:type,
              env:tags.ENV
            }" \
            -o json > output/resources.json

          az resource list \
            --query "[?tags.CreatedByPipeline=='true'].name" \
            -o json > output/new_resources.json

    # Install Python runtime required for Excel report generation.
    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.x'

    # Generate formatted Excel report using Python script.
    - script: |
        echo "Build ID: $(Build.BuildId)"

        export BUILD_BUILDID=$(Build.BuildId)

        pip install openpyxl pandas

        python scripts/generate_resource_report.py
      displayName: Generate Excel Report

    # Publish generated Excel report as Azure DevOps artifact.
    - task: PublishBuildArtifacts@1
      displayName: Publish Resource Report
      inputs:
        PathtoPublish: 'output'
        ArtifactName: 'resource-report'
        publishLocation: 'Container'