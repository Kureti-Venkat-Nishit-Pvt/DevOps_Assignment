trigger:
- Mark_6

parameters:
- name: environment
  displayName: Environment
  type: string
  default: dev
  values:
  - dev
  - prod

pool:
  vmImage: ubuntu-latest

variables:
  terraformVersion: '1.5.7'
  azureServiceConnection: 'AzureSPN'
  deployToAks: 'true'
  tfvarsFile: '${{ parameters.environment }}.tfvars'
  imageRepository: 'dragot-calculator'

  # Only pipeline-controlled metadata (NOT infrastructure names)
  envTag: ${{ parameters.environment }}
  buildId: $(Build.BuildId)

stages:

# =========================================================
# CREATE AZURE RESOURCES
# =========================================================
- stage: CreateResources
  displayName: Create Azure Resources

  jobs:
  - job: TerraformDeployment
    displayName: Terraform Resource Creation

    steps:
    - checkout: self

    - task: TerraformInstaller@1
      displayName: Install Terraform
      inputs:
        terraformVersion: '$(terraformVersion)'

    - task: AzureCLI@2
      displayName: Terraform Init and Validate
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -eo pipefail
          cd terraform
          terraform init
          terraform validate

    - task: AzureCLI@2
      displayName: Create Resource Group
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          cd terraform
          terraform apply -auto-approve \
            -var-file="$(tfvarsFile)" \
            -target=azurerm_resource_group.rg

    - task: AzureCLI@2
      displayName: Create ACR
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          cd terraform
          terraform apply -auto-approve \
            -var-file="$(tfvarsFile)" \
            -target=azurerm_container_registry.acr

    - task: AzureCLI@2
      displayName: Create AKS
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          cd terraform
          terraform apply -auto-approve \
            -var-file="$(tfvarsFile)" \
            -target=azurerm_kubernetes_cluster.aks

    - task: AzureCLI@2
      displayName: Create App Service Resources
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          cd terraform

          terraform apply -auto-approve \
            -var-file="$(tfvarsFile)" \
            -target=azurerm_service_plan.asp

          terraform apply -auto-approve \
            -var-file="$(tfvarsFile)" \
            -target=azurerm_linux_web_app.webapp

    - task: AzureCLI@2
      displayName: Apply Role Assignments
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -euo pipefail
          cd terraform

          terraform apply -auto-approve \
            -var-file="$(tfvarsFile)" \
            -target=azurerm_role_assignment.aks_kubelet_acr_pull \
            -target=azurerm_role_assignment.webapp_acr_pull

    - task: AzureCLI@2
      displayName: Final Terraform Plan Verification
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          cd terraform
          terraform plan -var-file="$(tfvarsFile)"


# =========================================================
# BUILD ARTIFACT
# =========================================================
- stage: BuildArtifact
  displayName: Archive and Publish Artifact
  dependsOn: CreateResources
  condition: succeeded()

  jobs:
  - job: BuildAndPublish
    steps:
    - checkout: self

    - task: ArchiveFiles@2
      displayName: Archive Application Files
      inputs:
        rootFolderOrFile: '$(Build.SourcesDirectory)'
        includeRootFolder: false
        archiveType: zip
        archiveFile: '$(Build.ArtifactStagingDirectory)/app.zip'
        replaceExistingArchive: true

    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/app.zip'
        ArtifactName: 'drop'
        publishLocation: 'Container'


# =========================================================
# DOCKER BUILD & PUSH
# =========================================================
- stage: BuildAndPushImage
  displayName: Build and Push Docker Image
  dependsOn: BuildArtifact
  condition: succeeded()

  jobs:
  - job: BuildAndPush
    steps:
    - checkout: self

    - task: AzureCLI@2
      displayName: Build and Push Image
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -euo pipefail

          az acr show -n "$(acrName)" -g "$(resourceGroupName)" 1>/dev/null

          az acr build \
            -r "$(acrName)" \
            -t "$(imageRepository):$(Build.BuildId)" \
            .


# =========================================================
# MANUAL APPROVAL
# =========================================================
- stage: ManualApproval
  displayName: Manual Approval
  dependsOn: BuildAndPushImage
  condition: succeeded()

  jobs:
  - job: WaitForApproval
    pool: server
    steps:
    - task: ManualValidation@0
      timeoutInMinutes: 1440
      inputs:
        instructions: 'Approve to continue deployment.'
        onTimeout: 'reject'


# =========================================================
# DEPLOY WEB APP
# =========================================================
- stage: DeployWebAppContainer
  displayName: Deploy WebApp Container
  dependsOn: ManualApproval
  condition: succeeded()

  jobs:
  - deployment: DeployApplication
    environment: '${{ parameters.environment }}'

    strategy:
      runOnce:
        deploy:
          steps:

          - task: AzureCLI@2
            displayName: Deploy WebApp Image
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail

                LOGIN_SERVER=$(az acr show -n "$(acrName)" -g "$(resourceGroupName)" --query loginServer -o tsv)

                IMAGE="${LOGIN_SERVER}/$(imageRepository):$(Build.BuildId)"

                az webapp config container set \
                  --resource-group "$(resourceGroupName)" \
                  --name "$(webAppName)" \
                  --docker-custom-image-name "$IMAGE"


# =========================================================
# OPTIONAL AKS DEPLOYMENT
# =========================================================
- stage: DeployAKSOptional
  displayName: Deploy to AKS
  dependsOn: ManualApproval
  condition: and(succeeded(), eq(variables['deployToAks'], 'true'))

  jobs:
  - deployment: DeployToAKS
    environment: '${{ parameters.environment }}'

    strategy:
      runOnce:
        deploy:
          steps:

          - checkout: self

          - task: HelmInstaller@1
            inputs:
              helmVersionToInstall: '3.14.4'

          - task: AzureCLI@2
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail

                LOGIN_SERVER=$(az acr show -n "$(acrName)" -g "$(resourceGroupName)" --query loginServer -o tsv)

                az aks get-credentials \
                  --resource-group "$(resourceGroupName)" \
                  --name "$(aksClusterName)" \
                  --overwrite-existing

                helm upgrade --install dragot-calculator \
                  "$(Build.SourcesDirectory)/helm/dragot-calculator" \
                  --namespace calculator \
                  --create-namespace \
                  --set image.repository="${LOGIN_SERVER}/$(imageRepository)" \
                  --set image.tag="$(Build.BuildId)" \
                  --wait


# =========================================================
# 📊 RESOURCE REPORT GENERATION
# =========================================================
- stage: GenerateResourceReport
  displayName: Generate Resource Inventory Report
  dependsOn: DeployAKSOptional
  condition: always()

  jobs:
  - job: Report
    steps:

    - checkout: self

    - task: AzureCLI@2
      displayName: Fetch Azure Resources
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az resource list \
            --query "[].{name:name, rg:resourceGroup, type:type, tags:tags}" \
            -o json > resources.json

    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.x'

    - script: |
        echo "Build ID: $(Build.BuildId)"
        export BUILD_BUILDID=$(Build.BuildId)
        pip install openpyxl pandas
        python scripts/generate_resource_report.py
      displayName: Generate Excel Report

    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: 'output'
        ArtifactName: 'resource-report'