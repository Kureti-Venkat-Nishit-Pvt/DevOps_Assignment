trigger:
- Mark_4

pool:
  vmImage: ubuntu-latest

variables:
  terraformVersion: '1.5.7'
  azureServiceConnection: 'AzureSPN'
  resourceGroupName: 'RG_cal_ind_dev_01'
  webAppName: 'webcalinddev01'
  acrName: 'acrcalinddev01'
  aksClusterName: 'aks-cal-ind-dev-01'
  imageRepository: 'dragot-calculator'
  deployToAks: 'true'

stages:
- stage: CreateResources
  displayName: Create Azure Resources
  jobs:
  - job: TerraformDeployment
    displayName: Terraform Resource Creation
    steps:
    - checkout: self
    - task: TerraformInstaller@1
      displayName: Install Terraform
      inputs:
        terraformVersion: '$(terraformVersion)'
    - task: AzureCLI@2
      displayName: Terraform Init and Validate
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -eo pipefail
          cd terraform
          terraform init
          terraform validate
    - task: AzureCLI@2
      displayName: Create Resource Group (Terraform Target)
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          cd terraform
          terraform apply -auto-approve -target=azurerm_resource_group.rg
    - task: AzureCLI@2
      displayName: Create ACR (Terraform Target)
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          cd terraform
          terraform apply -auto-approve -target=azurerm_container_registry.acr
    - task: AzureCLI@2
      displayName: Create AKS (Terraform Target)
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          cd terraform
          terraform apply -auto-approve -target=azurerm_kubernetes_cluster.aks
    - task: AzureCLI@2
      displayName: Create App Service Resources
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          cd terraform
          terraform apply -auto-approve -target=azurerm_service_plan.asp
          terraform apply -auto-approve -target=azurerm_linux_web_app.webapp
    - task: AzureCLI@2
      displayName: Apply ACR Pull Role Assignments
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -euo pipefail
          cd terraform
          terraform apply -auto-approve \
            -target=azurerm_role_assignment.aks_kubelet_acr_pull \
            -target=azurerm_role_assignment.webapp_acr_pull
    - task: AzureCLI@2
      displayName: Final Terraform Plan (Verification)
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          cd terraform
          terraform plan

- stage: BuildArtifact
  displayName: Archive and Publish Artifact
  dependsOn: CreateResources
  condition: succeeded()
  jobs:
  - job: BuildAndPublish
    displayName: Build And Publish
    steps:
    - checkout: self
    - task: ArchiveFiles@2
      displayName: Archive Application Files
      inputs:
        rootFolderOrFile: '$(Build.SourcesDirectory)'
        includeRootFolder: false
        archiveType: zip
        archiveFile: '$(Build.ArtifactStagingDirectory)/app.zip'
        replaceExistingArchive: true
    - task: PublishBuildArtifacts@1
      displayName: Publish Application Artifact
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/app.zip'
        ArtifactName: 'drop'
        publishLocation: 'Container'

- stage: BuildAndPushImage
  displayName: Build and Push Docker Image
  dependsOn: BuildArtifact
  condition: succeeded()
  jobs:
  - job: BuildAndPush
    displayName: Build And Push Image
    steps:
    - checkout: self
    - task: AzureCLI@2
      displayName: Build and Push Image to ACR
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -euo pipefail
          az acr show -n "$(acrName)" -g "$(resourceGroupName)" 1>/dev/null
          cd "$(Build.SourcesDirectory)"
          az acr build -r "$(acrName)" -t "$(imageRepository):$(Build.BuildId)" .

- stage: ManualApproval
  displayName: Manual Approval
  dependsOn: BuildAndPushImage
  condition: succeeded()
  jobs:
  - job: WaitForApproval
    displayName: Wait For Manual Validation
    pool: server
    steps:
    - task: ManualValidation@0
      timeoutInMinutes: 1440
      inputs:
        notifyUsers: ''
        instructions: 'Approve to continue deployment to WebApp and optional AKS.'
        onTimeout: 'reject'

- stage: DeployWebAppContainer
  displayName: Deploy Container to Web App
  dependsOn: ManualApproval
  condition: succeeded()
  jobs:
  - job: DeployApplication
    displayName: Deploy Container Image To WebApp
    steps:
    - task: AzureCLI@2
      displayName: Point WebApp to ACR Image
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -euo pipefail
          LOGIN_SERVER="$(az acr show -n "$(acrName)" -g "$(resourceGroupName)" --query loginServer -o tsv)"
          IMAGE_NAME="${LOGIN_SERVER}/$(imageRepository):$(Build.BuildId)"
          az webapp config container set \
            --resource-group "$(resourceGroupName)" \
            --name "$(webAppName)" \
            --docker-custom-image-name "${IMAGE_NAME}" \
            --docker-registry-server-url "https://${LOGIN_SERVER}"
          az webapp config set \
            --resource-group "$(resourceGroupName)" \
            --name "$(webAppName)" \
            --generic-configurations '{"acrUseManagedIdentityCreds":true}'
          az webapp config appsettings set \
            --resource-group "$(resourceGroupName)" \
            --name "$(webAppName)" \
            --settings WEBSITES_PORT=8000

- stage: DeployAKSOptional
  displayName: Deploy to AKS (Optional)
  dependsOn: ManualApproval
  condition: and(succeeded(), eq(variables['deployToAks'], 'true'))
  jobs:
  - job: DeployToAKS
    displayName: Deploy Image to AKS
    steps:
    - checkout: self
    - task: HelmInstaller@1
      displayName: Install Helm
      inputs:
        helmVersionToInstall: '3.14.4'
    - task: AzureCLI@2
      displayName: Configure kubectl and Helm upgrade
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -euo pipefail
          LOGIN_SERVER="$(az acr show -n "$(acrName)" -g "$(resourceGroupName)" --query loginServer -o tsv)"
          az aks get-credentials --resource-group "$(resourceGroupName)" --name "$(aksClusterName)" --overwrite-existing
          helm upgrade --install dragot-calculator "$(Build.SourcesDirectory)/helm/dragot-calculator" \
            --namespace calculator \
            --create-namespace \
            --set image.repository="${LOGIN_SERVER}/$(imageRepository)" \
            --set image.tag="$(Build.BuildId)" \
            --wait --timeout 10m
